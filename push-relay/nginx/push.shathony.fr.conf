# SPDX-License-Identifier: Apache-2.0
# nginx vhost for mobilecode-push-relay on push.shathony.fr.
#
# Deploy steps:
#   1. Point DNS:  push.shathony.fr  -> your server's public IP (A/AAAA record).
#   2. Copy this file to /etc/nginx/sites-available/push.shathony.fr
#      and symlink it into sites-enabled/  (or drop under /etc/nginx/conf.d/).
#   3. `docker compose up -d` the relay (so 127.0.0.1:3000 answers).
#   4. Obtain the TLS cert + let certbot rewrite the ssl block below:
#        sudo certbot --nginx -d push.shathony.fr
#      Certbot will add ssl_certificate / ssl_certificate_key and the 301
#      redirect. The ssl_* lines below are placeholders it will fill in.
#   5. sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS redirect (certbot will manage this once it runs).
server {
    listen 80;
    listen [::]:80;
    server_name push.shathony.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name push.shathony.fr;

    # --- TLS (managed by Certbot — these paths are created by
    #     `certbot --nginx -d push.shathony.fr`) -----------------------------
    ssl_certificate     /etc/letsencrypt/live/push.shathony.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/push.shathony.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ----------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "no-referrer"                          always;

    # Relay payloads are tiny JSON; cap the body to reject abuse early.
    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:3000;

        # APNs pushes are fire-and-forget JSON; turn proxy buffering OFF so the
        # request is streamed straight through (and so any future SSE/WebSocket
        # upgrade Just Works without re-editing this file).
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (harmless for plain HTTP clients; future-proof).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}
